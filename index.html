<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <title>Ամսվա վաճառքներ և պարտքեր</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; }
    h1, h2 { text-align: center; }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      font-size: 18px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }
    .section { margin-top: 20px; }
    .day-block {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
      background: #f9f9f9;
    }
    ul { padding-left: 20px; }
  </style>
</head>
<body>
  <h1>Ամսվա վաճառքներ և պարտքեր</h1>

  <!-- Վաճառք ավելացնելու ձև -->
  <div class="section">
    <h2>Ավելացնել վաճառք</h2>
    <input type="number" id="saleInput" placeholder="Գինը դրամով">
    <button onclick="addSale()">Ավելացնել</button>
  </div>

  <!-- Օրվա վաճառքներ -->
  <div class="section">
    <h2>Այսօրվա վաճառքներ</h2>
    <ul id="salesList"></ul>
    <p><strong>Օրվա ընդհանուր՝ <span id="dayTotal">0</span> դրամ</strong></p>
    <button onclick="clearDay()">🗑️ Մաքրել օրվա վաճառքները</button>
  </div>

  <!-- Ամսվա բոլոր օրերը -->
  <div class="section">
    <h2>Ամսվա օրեր</h2>
    <div id="monthDays"></div>
    <p><strong>Ամսվա ընդհանուր՝ <span id="monthTotal">0</span> դրամ</strong></p>
    <button onclick="clearMonth()">🗑️ Մաքրել ամբողջ ամսվա տվյալները</button>
  </div>

  <!-- Պարտքերի բաժին -->
  <div class="section">
    <h2>Պարտքերի ցուցակ</h2>
    <input type="text" id="debtorName" placeholder="Պարտք վերցնողի անուն">
    <input type="number" id="debtAmount" placeholder="Գումարը դրամով">
    <button onclick="addDebt()">Ավելացնել պարտք</button>
    <ul id="debtsList"></ul>
    <p><strong>Ընդհանուր պարտք՝ <span id="totalDebt">0</span> դրամ</strong></p>
    <button onclick="clearDebts()">🗑️ Մաքրել բոլոր պարտքերը</button>
  </div>

  <script>
    const todayKey = new Date().toISOString().split("T")[0];
    let allSales = JSON.parse(localStorage.getItem("allSales")) || {};
    if (!allSales[todayKey]) allSales[todayKey] = [];

    let debts = JSON.parse(localStorage.getItem("debts")) || [];

    function render() {
      // Օրվա վաճառքներ
      const salesList = document.getElementById("salesList");
      salesList.innerHTML = "";
      let dayTotal = 0;
      allSales[todayKey].forEach((price, i) => {
        const li = document.createElement("li");
        li.textContent = `Վաճառք ${i+1} - ${price} դրամ`;
        salesList.appendChild(li);
        dayTotal += price;
      });
      document.getElementById("dayTotal").textContent = dayTotal;

      // Ամսվա օրերի ցուցակ
      const monthDays = document.getElementById("monthDays");
      monthDays.innerHTML = "";
      let monthTotal = 0;
      for (let day in allSales) {
        let daySum = allSales[day].reduce((a,b)=>a+b,0);
        monthTotal += daySum;
        const div = document.createElement("div");
        div.className = "day-block";
        div.innerHTML = `<strong>${day}</strong> — ${daySum} դրամ`;
        monthDays.appendChild(div);
      }
      document.getElementById("monthTotal").textContent = monthTotal;

      // Պարտքերի ցուցակ
      const debtsList = document.getElementById("debtsList");
      debtsList.innerHTML = "";
      let totalDebt = 0;
      debts.forEach((debt, i) => {
        const li = document.createElement("li");
        li.textContent = `${debt.name} — ${debt.amount} դրամ`;
        const btn = document.createElement("button");
        btn.textContent = "Ջնջել";
        btn.onclick = () => {
          debts.splice(i,1);
          localStorage.setItem("debts", JSON.stringify(debts));
          render();
        };
        li.appendChild(btn);
        debtsList.appendChild(li);
        totalDebt += debt.amount;
      });
      document.getElementById("totalDebt").textContent = totalDebt;
    }

    function addSale() {
      const price = parseInt(document.getElementById("saleInput").value);
      if (!isNaN(price) && price > 0) {
        allSales[todayKey].push(price);
        localStorage.setItem("allSales", JSON.stringify(allSales));
        render();
        document.getElementById("saleInput").value = "";
      } else {
        alert("Մուտքագրիր ճիշտ գին։");
      }
    }

    function clearDay() {
      if (confirm("Վստա՞հ ես, որ ուզում ես մաքրել այսօրվա վաճառքները։")) {
        allSales[todayKey] = [];
        localStorage.setItem("allSales", JSON.stringify(allSales));
        render();
      }
    }

    function clearMonth() {
      if (confirm("Վստա՞հ ես, որ ուզում ես մաքրել ամբողջ ամսվա տվյալները։")) {
        allSales = {};
        localStorage.setItem("allSales", JSON.stringify(allSales));
        render();
      }
    }

    function addDebt() {
      const name = document.getElementById("debtorName").value.trim();
      const amount = parseInt(document.getElementById("debtAmount").value);
      if (name && !isNaN(amount) && amount > 0) {
        debts.push({name, amount});
        localStorage.setItem("debts", JSON.stringify(debts));
        render();
        document.getElementById("debtorName").value = "";
        document.getElementById("debtAmount").value = "";
      } else {
        alert("Մուտքագրիր ճիշտ անուն և գումար։");
      }
    }

    function clearDebts() {
      if (confirm("Վստա՞հ ես, որ ուզում ես մաքրել բոլոր պարտքերը։")) {
        debts = [];
        localStorage.setItem("debts", JSON.stringify(debts));
        render();
      }
    }

    render();
  </script>
</body>
</html>
